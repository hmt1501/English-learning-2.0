name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Cho phép chạy tay từ tab Actions
  workflow_dispatch:

# Quyền tối thiểu để đẩy lên Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Đang deploy dở mà có push mới thì để lần deploy đang chạy xong đã.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cài đặt gói
        run: npm ci

      - name: Kiểm tra nội dung (zod, trùng id, tham chiếu chéo)
        run: npm run validate

      - name: Lint
        run: npm run lint

      - name: Unit test
        run: npm test

      - name: Build tĩnh
        # basePath lấy từ TÊN REPO, nên đổi tên repo vẫn deploy đúng đường dẫn.
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Chặn Jekyll xử lý thư mục _next
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
